{% extends "base.html" %}
{% block title %}Registrarse{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">

<div class="auth-wrapper">
    <div class="auth-overlay"></div>

    <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Crear Cuenta</h2>
            <p class="auth-subtitle">Únete a FilmLog y organiza tu entretenimiento</p>
        </div>

        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" class="form-control" placeholder="Tu alias" required>
            </div>

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth">Registrarse</button>
        </form>

        <div class="auth-footer">
            <p>¿Ya tienes una cuenta? <a href="{{ url_for('login') }}">Inicia sesión aquí</a></p>
        </div>
    </div>
</div>
{% endblock %}
