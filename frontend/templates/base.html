<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FilmLog{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
</head>
<body>
    <header>
        <div style="display:flex; align-items:center; gap: 30px;">
            <a href="{{ url_for('index') }}" class="logo">FilmLog</a>

            <nav>
                <a href="{{ url_for('index') }}" class="nav-link" style="color:white;">Inicio</a>
                <a href="{{ url_for('view_all', category='movies') }}" class="nav-link">Películas</a>
                <a href="{{ url_for('view_all', category='tvshows') }}" class="nav-link">Series</a>
            </nav>
        </div>

        <div class="search-container">
            <form action="{{ url_for('index') }}" method="GET" class="search-bar" autocomplete="off">
                <button type="submit" class="search-icon-btn"><i class="fas fa-search"></i></button>
                <input type="text" name="q" id="searchInput" placeholder="Buscar películas o series...">
            </form>

            <div class="search-results" id="searchResults"></div>
        </div>

        <div>
            {% if session.get('username') %}
                <div class="user-controls">

                    <a href="{{ url_for('profile') }}" class="profile-pill" title="Ir a mi perfil">
                        <div class="avatar-circle">
                            <i class="fas fa-user"></i>
                        </div>
                        <span class="username-text">{{ session['username'] }}</span>
                    </a>

                    <a href="{{ url_for('logout') }}" class="logout-icon-btn" title="Cerrar Sesión">
                        <i class="fas fa-power-off"></i>
                    </a>

                </div>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-primary">Login</a>
            {% endif %}
        </div>
    </header>

    <div class="content-area">
        {% block content %}{% endblock %}
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsBox = document.getElementById('searchResults');
        let debounceTimer;
        const API_BASE = 'http://127.0.0.1:5000/api';

        if(searchInput) {
            searchInput.addEventListener('input', function() {
                const query = this.value.trim();
                clearTimeout(debounceTimer);

                if (query.length < 2) {
                    resultsBox.classList.remove('active');
                    resultsBox.innerHTML = '';
                    return;
                }

                debounceTimer = setTimeout(async () => {
                    try {
                        const [resMovies, resTV] = await Promise.all([
                            fetch(`${API_BASE}/movies?search=${query}`),
                            fetch(`${API_BASE}/tvshows?search=${query}`)
                        ]);

                        const movies = await resMovies.json();
                        const tvshows = await resTV.json();
                        let combined = [];

                        if(Array.isArray(movies)) movies.forEach(m => combined.push({...m, type: 'movie'}));
                        if(Array.isArray(tvshows)) tvshows.forEach(t => combined.push({...t, type: 'tv'}));

                        const results = combined.slice(0, 5);
                        renderResults(results);

                    } catch (err) {
                        console.error("Error buscando:", err);
                    }
                }, 300);
            });
        }

        function renderResults(items) {
            if (items.length === 0) {
                resultsBox.innerHTML = '<div class="no-results">No se encontraron resultados.</div>';
                resultsBox.classList.add('active');
                return;
            }

            let html = '';
            items.forEach(item => {
                const title = item.title || item.name;
                const year = (item.releaseDate || item.firstAirDate || '').split('-')[0];
                const poster = item.posterUrl || 'https://via.placeholder.com/40x60';
                const typeLabel = item.type === 'movie' ? 'Película' : 'Serie';
                const url = `/movie/${item._id}`;

                html += `
                    <a href="${url}" class="result-item">
                        <img src="${poster}" class="result-poster" alt="${title}">
                        <div class="result-info">
                            <div class="result-title">${title}</div>
                            <div class="result-meta"><span class="meta-tag">${typeLabel}</span> ${year}</div>
                        </div>
                    </a>
                `;
            });

            resultsBox.innerHTML = html;
            resultsBox.classList.add('active');
        }

        document.addEventListener('click', (e) => {
            if (document.querySelector('.search-container') && !document.querySelector('.search-container').contains(e.target)) {
                resultsBox.classList.remove('active');
            }
        });
    </script>
</body>
</html>
