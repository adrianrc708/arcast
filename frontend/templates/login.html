{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/forms.css') }}">

<div class="auth-wrapper">
    <div class="auth-overlay"></div> <div class="auth-card">
        <div class="auth-header">
            <h2 class="auth-title">Bienvenido de nuevo</h2>
            <p class="auth-subtitle">Ingresa tus credenciales para continuar</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth">Iniciar Sesión</button>
        </form>

        <div class="auth-footer">
            <p>¿Aún no tienes una cuenta? <a href="{{ url_for('register') }}">Regístrate gratis</a></p>
        </div>
    </div>
</div>
{% endblock %}
