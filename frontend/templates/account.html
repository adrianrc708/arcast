{% extends "base.html" %}
{% block title %}Configuración - FilmLog{% endblock %}

{% block content %}
<div class="settings-wrapper">
    <div class="settings-card">
        <div class="settings-header">
            <h2>Configuración</h2>
            <p>Administra tu información personal</p>
        </div>

        <div class="settings-section">
            <label class="settings-label">Nombre de Usuario</label>
            <form id="updateNameForm" action="{{ url_for('update_account') }}" method="POST" class="settings-input-group">
                <input type="text" name="username" value="{{ user.username }}" class="settings-input" required>
                <button type="button" class="btn btn-primary" onclick="confirmUpdate()">Guardar</button>
            </form>
        </div>

        <div class="settings-section">
            <label class="settings-label">Correo Electrónico (No editable)</label>
            <div class="settings-input-group">
                <input type="email" value="{{ user.email }}" class="settings-input" disabled>
            </div>
        </div>

        <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center;">
            <a href="{{ url_for('profile') }}" class="btn btn-outline">← Volver al Perfil</a>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="confirmationModal">
    <div class="custom-modal">
        <div class="modal-icon" style="color: var(--accent);">
            <i class="fas fa-user-edit"></i>
        </div>
        <h3 class="modal-title">¿Cambiar nombre?</h3>
        <p class="modal-text">Esto modificará tu identidad pública en la plataforma.</p>

        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeModal()">Cancelar</button>
            <button class="btn-modal btn-primary" id="confirmBtn">Confirmar</button>
        </div>
    </div>
</div>

<script>
    const modalOverlay = document.getElementById('confirmationModal');
    const confirmBtn = document.getElementById('confirmBtn');
    const form = document.getElementById('updateNameForm');

    function confirmUpdate() {
        modalOverlay.classList.add('active');
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
    }

    confirmBtn.addEventListener('click', () => {
        form.submit(); // Envía el formulario real
    });

    // Cerrar al hacer clic fuera
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });
</script>
{% endblock %}
